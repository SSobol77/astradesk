services:
  # PostgreSQL Database (pgvector/pgvector:pg18, pinned by digest — same
  # engine baseline as docker-compose.yml's `db`; migrations/0001_init_pgvector.sql
  # requires the `vector` extension, which vanilla postgres:*-alpine lacks).
  postgres:
    image: pgvector/pgvector@sha256:212765b63c1462883de295c4c415edcd22191b8d8d46853e86ad05d4b577a4cb
    environment:
      POSTGRES_DB: astradesk
      POSTGRES_USER: astradesk
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      # pg18+ images store data under a version-specific subdirectory of
      # /var/lib/postgresql itself (pg_ctlcluster-compatible layout) — mounting
      # at the old .../data path leaves the volume "unused" and the container
      # exits at startup. See https://github.com/docker-library/postgres/pull/1259.
      - postgres_data:/var/lib/postgresql
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astradesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (redis:8.2.2, pinned by digest — matches docker-compose.yml baseline)
  redis:
    image: redis@sha256:4521b581dbddea6e7d81f8fe95ede93f5648aaa66a9dacd581611bf6fe7527bd
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NATS Message Queue (nats:2.12.1-alpine, pinned by digest — matches
  # docker-compose.yml baseline)
  nats:
    image: nats@sha256:b3f2bd84176ae7bd0afa9c48a00f06d7d0818ff4aaee898e4172e0b8340e5816
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus Monitoring (prom/prometheus:v3.7.1, pinned by digest — matches
  # docker-compose.yml baseline)
  prometheus:
    image: prom/prometheus@sha256:ff7e389acbe064a4823212a500393d40a28a8f362e4b05cbf6742a9a3ef736b2
    ports:
      - "9090:9090"
    volumes:
      - ./dev/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  # Grafana Dashboard — dev-only UI helper, out of the runtime-critical path;
  # pinned to grafana:13.0.3 by digest for hygiene even though the invariant
  # only requires this for runtime-critical services.
  grafana:
    image: grafana/grafana@sha256:1a345428a36270f5fb9add69fea71450a5843c15266c99359d6d380470ab19c9
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dev/grafana/provisioning:/etc/grafana/provisioning
      - ./dev/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://astradesk:dev_password@postgres:5432/astradesk
      - REDIS_URL=redis://redis:6379/0
      - NATS_URL=nats://nats:4222
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
    volumes:
      - .:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: ["uvicorn", "services.api_gateway.src.gateway.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # MCP Support Server (mcp_server.py binds :8001 internally, see
  # packages/domain-support/src/domain_support/tools/mcp_server.py)
  mcp-support:
    build:
      context: .
      dockerfile: packages/domain-support/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
    # Mounted at the package's own path (not `/app`): the image's `/app`
    # already holds `.venv` and `core/` from the build (see
    # packages/domain-support/Dockerfile); mounting the host source directly
    # onto `/app` shadowed both and broke `python -m
    # domain_support.tools.mcp_server` with `ModuleNotFoundError: No module
    # named 'domain_support'` (found while wiring ISSUE 018's integration
    # gate — see audit/evidence/18_integration_ci_gate.md).
    volumes:
      - ./packages/domain-support:/app/packages/domain-support
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MCP Ops Server (mcp_server.py binds :8002 internally, see
  # packages/domain-ops/src/domain_ops/tools/mcp_server.py)
  mcp-ops:
    build:
      context: .
      dockerfile: packages/domain-ops/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
    # See mcp-support's volume comment above: mounted at the package's own
    # path, not `/app`, so the image's `.venv`/`core/` are not shadowed.
    volumes:
      - ./packages/domain-ops:/app/packages/domain-ops
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MCP Finance Server (mcp_server.py binds :8003 internally, see
  # packages/domain-finance/src/domain_finance/tools/mcp_server.py)
  mcp-finance:
    build:
      context: .
      dockerfile: packages/domain-finance/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
    # See mcp-support's volume comment above: mounted at the package's own
    # path, not `/app`, so the image's `.venv`/`core/` are not shadowed.
    volumes:
      - ./packages/domain-finance:/app/packages/domain-finance
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MCP Supply Chain Server (mcp_server.py binds :8004 internally, see
  # packages/domain-supply/src/domain_supply/tools/mcp_server.py)
  mcp-supply:
    build:
      context: .
      dockerfile: packages/domain-supply/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
    # See mcp-support's volume comment above: mounted at the package's own
    # path, not `/app`, so the image's `.venv`/`core/` are not shadowed.
    volumes:
      - ./packages/domain-supply:/app/packages/domain-supply
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Development Database Admin (pgAdmin) — dev-only UI helper, out of the
  # runtime-critical path; pinned by digest for hygiene even though the
  # invariant only requires this for runtime-critical services.
  pgadmin:
    image: dpage/pgadmin4@sha256:40fa840c5bb7c8463957f1255b01283732c2d8c9396a956d180f8e6c296753b3
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@astradesk.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # Redis Commander (Web UI for Redis) — dev-only UI helper, out of the
  # runtime-critical path; pinned by digest for hygiene even though the
  # invariant only requires this for runtime-critical services.
  redis-commander:
    image: rediscommander/redis-commander@sha256:19cd0c49f418779fa2822a0496c5e6516d0c792effc39ed20089e6268477e40a
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  pgadmin_data:

networks:
  default:
    name: astradesk-dev
    driver: bridge
