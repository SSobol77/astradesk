apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: astradesk-gateway
  namespace: astradesk-prod
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: astradesk-tls
    hosts:
    - "*.astradesk.local"
