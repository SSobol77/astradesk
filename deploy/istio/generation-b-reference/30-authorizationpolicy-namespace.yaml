apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: astradesk-allow-from-namespace-and-ingress
  namespace: astradesk
spec:
  selector:
    matchLabels:
      app: astradesk  # Applies to workloads with label app=astradesk (e.g., astradesk-api)
  # Neither rule below sets `to`: Istio rejects an empty `to.operation` as
  # invalid (`istioctl validate` / the validating webhook both reject it).
  # Omitting `to` entirely is the correct way to express "no operation
  # restriction" for an allowed source.
  rules:
    - from:
        - source:
            namespaces: ["astradesk"]  # Allows traffic from within astradesk namespace
    - from:
        - source:
            principals:
              - "cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"  # Istio IngressGateway SA
