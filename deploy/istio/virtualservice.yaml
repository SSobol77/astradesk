apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: astradesk-vs
  namespace: astradesk-prod
spec:
  hosts:
  - "api.astradesk.local"
  - "ticket.astradesk.local"
  - "admin.astradesk.local"
  - "auditor.astradesk.local"
  gateways:
  - astradesk-gateway
  http:
  - match:
    - uri:
        prefix: /api
    route:
    - destination:
        host: astradesk-api
        port:
          number: 8080
  - match:
    - uri:
        prefix: /ticket
    route:
    - destination:
        host: astradesk-ticket-adapter
        port:
          number: 8080
  - match:
    - uri:
        prefix: /auditor
    route:
    - destination:
        host: astradesk-auditor
        port:
          number: 8080
  # /auditor above must stay ordered before this catch-all /: Istio evaluates
  # HTTP match rules in list order and takes the first match, so a catch-all
  # placed earlier would shadow every more specific prefix listed after it
  # (confirmed by `istioctl validate`'s "not used" warning before this fix).
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: astradesk-admin
        port:
          number: 3000
