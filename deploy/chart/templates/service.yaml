{{- range $service := list "api" "ticketAdapter" "admin" "auditor" }}
---
apiVersion: v1
kind: Service
metadata:
  name: astradesk-{{ $service | kebabcase }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: astradesk-{{ $service }}
spec:
  selector:
    app: astradesk-{{ $service }}
  ports:
  - protocol: TCP
    port: {{ if eq $service "api" }}8080{{ else if eq $service "admin" }}3000{{ else }}8080{{ end }}
    targetPort: {{ if eq $service "api" }}8080{{ else if eq $service "admin" }}3000{{ else }}8080{{ end }}
    name: http
{{- end }}
