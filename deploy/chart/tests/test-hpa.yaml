apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-hpa-test"
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
  - name: test
    image: bitnami/kubectl:latest
    command: ["kubectl"]
    args:
    - "get"
    - "hpa"
    - "-n"
    - "{{ .Release.Namespace }}"
    - "-o"
    - "jsonpath={.items[*].spec.metrics[0].resource.target.averageUtilization}"
    - "--ignore-not-found"
  restartPolicy: Never
