# ============================================================================
# AstraDesk — MkDocs Material configuration
# ============================================================================
site_name: AstraDesk Framework
site_description: "AstraDesk Enterprise AI Agents Framework — Technical Guide (v1.0)"
site_url: https://astradesk.vercel.app
repo_url: https://github.com/SSobol77/astradesk
repo_name: SSobol77/astradesk
copyright: "© 2025-2026 AstraDesk"

docs_dir: docs

# Standalone localized README mirrors are maintained for GitHub rendering (they use
# repo-relative and GitHub links), not as MkDocs site pages, and are not in the nav.
# Exclude them so `--strict` does not flag their GitHub-oriented links.
exclude_docs: |
  pl/README.pl.main.md
  pl/README.pl.md
  zh-CN/README.zh-CN.main.md
  roadmap/issues/
  roadmap/engineering_task.md

theme:
  name: material
  language: en
  logo: assets/astradesk-symbol.svg
  favicon: assets/astradesk-symbol.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: false
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.emoji

plugins:
  - search
  - redoc-tag

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - js/mermaid-init.js

extra_css:
  - styles/mermaid-card.css

watch:
  - docs/js
  - docs/styles

nav:
  - Home: README.md
  - Roadmap: roadmap/index.md

  - Guides (EN):
      - Introduction: en/01_introduction.md
      - Architecture Overview: en/02_architecture_overview.md
      - Plan Phase: en/03_plan_phase.md
      - Build Phase: en/04_build_phase.md
      - Test & Optimize: en/05_test_optimize.md
      - Deploy Phase: en/06_deploy_phase.md
      - Monitor & Operate: en/07_monitor_operate.md
      - Security & Governance: en/08_security_governance.md
      - MCP Gateway & Domain Packs: en/09_mcp_gateway_domain_packs.md
      - Future Roadmap: en/10_future_roadmap.md
      - Glossary: en/glossary.md

  - Przewodniki (PL):
      - Wprowadzenie: pl/01_introduction.pl.md
      - Przegląd Architektury: pl/02_architecture_overview.pl.md
      - Faza Planowania: pl/03_plan_phase.pl.md
      - Faza Budowy: pl/04_build_phase.pl.md
      - Testy i Optymalizacja: pl/05_test_optimize.pl.md
      - Faza Wdrożenia: pl/06_deploy_phase.pl.md
      - Monitorowanie i Operacje: pl/07_monitor_operate.pl.md
      - Bezpieczeństwo i Ład: pl/08_security_governance.pl.md
      - MCP Gateway & Domain Packs: pl/09_mcp_gateway_domain_packs.pl.md
      - Roadmapa: pl/10_future_roadmap.pl.md
      - Słownik: pl/glossary.pl.md

  # ZH: only the chapters that have been translated are linked. The remaining
  # chapters (01–08, 10, glossary) are not yet translated — see open items.
  - 指南 (ZH):
      - MCP 网关与领域包: zh-CN/09_mcp_gateway_domain_packs.zh.md

  - API (Redoc):
      - Admin API v1.2.0 — Reference: api/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SSobol77/astradesk
      name: GitHub
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/your-handle
      name: Twitter
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/your-company
      name: LinkedIn
