# CI pipeline for AstraDesk Framework AI.
# Aligns with pyproject: Python 3.13, project version 0.3.0.
# Runs linting, type-checks, tests with coverage across Python/Java/JS,
# builds Docker images for smoke, and enforces OpenAPI drift guard.
# Project: AstraDesk Framework AI
# Author: Siergej Sobolewski
# Since: 2025-10-25

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.13"
  JAVA_VERSION: "21"
  NODE_VERSION: "22"
  SONAR_PROJECT_VERSION: "0.3.0" # per pyproject version

jobs:
  build-test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies (locked)
        run: uv sync --frozen --extra dev

      - name: OpenAPI drift guard
        run: |
          chmod +x scripts/check-openapi-version.sh
          scripts/check-openapi-version.sh

      - name: Reproducible-build baseline guard (issue #41)
        run: uv run python scripts/ci/verify_build_baseline.py

      - name: Lint & Type Check
        run: |
          uv run python scripts/license_headers.py --check
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy .

      - name: Run Python Tests with Coverage
        run: uv run pytest -q --cov-report=xml:coverage.xml

      - name: Build Docker Image (Python)
        run: docker build -t astradesk:ci-python -f Dockerfile .

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.72.0

      - name: Supply-chain scan gate (issue #40)
        run: scripts/ci/supply_chain_scan.sh astradesk:ci-python

      - name: Upload Python coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml

  build-test-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "gradle"

      - name: Build and Test Java Adapter
        working-directory: services/ticket-adapter-java
        run: |
          ./gradlew build --no-daemon
          ./gradlew test jacocoTestReport --no-daemon

      - name: Build Docker Image (Java)
        # Dockerfile uses repo-root-relative COPY paths (gradlew, settings.gradle.kts,
        # services/ticket-adapter-java/…), so it must build with the repository root
        # as the Docker context.
        run: docker build -f services/ticket-adapter-java/Dockerfile -t astradesk:ci-java .

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.72.0

      - name: Supply-chain scan gate (issue #40)
        run: scripts/ci/supply_chain_scan.sh astradesk:ci-java

      - name: Upload Java coverage report
        uses: actions/upload-artifact@v4
        with:
          name: java-coverage
          path: services/ticket-adapter-java/build/reports/jacoco/test/jacocoTestReport.xml

  build-test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: services/admin-portal/package-lock.json

      - name: Install Dependencies
        working-directory: services/admin-portal
        run: npm ci

      - name: API contract sync
        working-directory: services/admin-portal
        run: npm run openapi:check

      - name: Run Tests with Coverage
        working-directory: services/admin-portal
        run: npm run test -- --coverage

      - name: Build Next.js
        working-directory: services/admin-portal
        # Build-time placeholder so client-env validation (lib/env.ts) passes during
        # static page-data collection. Runtime still requires a real value.
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
        run: npm run build

      - name: Build Docker Image (JS)
        # Dockerfile copies the portal and the canonical OpenAPI spec from repo-root paths.
        run: docker build -f services/admin-portal/Dockerfile -t astradesk:ci-js .

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.72.0

      - name: Supply-chain scan gate (issue #40)
        run: scripts/ci/supply_chain_scan.sh astradesk:ci-js

      - name: Upload JS coverage report
        uses: actions/upload-artifact@v4
        with:
          name: js-coverage
          path: services/admin-portal/coverage/lcov.info

  sonar-scan:
    runs-on: ubuntu-latest
    needs: [build-test-python, build-test-java, build-test-js]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports

      - name: Verify downloaded reports
        run: ls -R coverage-reports

      - name: Place Python coverage report for Sonar
        run: |
          cp coverage-reports/python-coverage/coverage.xml coverage.xml
          test -s coverage.xml

      - name: Run SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # GITHUB_TOKEN is required for pull request analysis
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -v "$PWD:/usr/src" \
            -e SONAR_HOST_URL="https://sonarcloud.io" \
            -e SONAR_TOKEN="$SONAR_TOKEN" \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.projectVersion=0.3.0 \  # ⟵ per pyproject version
            -Dsonar.scm.revision="${{ github.sha }}"
