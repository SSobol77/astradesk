[project]
name = "astradesk-domain-finance"
version = "0.3.0"
description = "Finance domain pack for AstraDesk — forecasting and ERP integration."
authors = [{ name = "Siergej Sobolewski", email = "s.sobolewski@hotmail.com" }]
license = "GPL-2.0-only"
requires-python = ">=3.13"

dependencies = [
  "astradesk-core",
  "prophet>=1.1,<2.0",
  "grpcio>=1.66,<2.0",
  "protobuf>=5.0",
  # tools/mcp_server.py imports these directly to serve the pack's standalone
  # MCP server; pinned to the same range as services/api-gateway so the
  # workspace lock resolves one already-audited version, not a second one.
  "fastapi>=0.133,<0.134",
  "uvicorn[standard]>=0.30,<0.31",
]

[project.entry-points."astradesk.pack"]
domain_finance = "domain_finance:Pack"

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.23",
  "respx>=0.20,<1.0",
  "grpcio-tools>=1.66,<2.0",
]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["domain_finance*"]
namespaces = false

[tool.setuptools.package-data]
domain_finance = ["flows/*.yaml", "policies/*.rego", "proto/*.proto"]
