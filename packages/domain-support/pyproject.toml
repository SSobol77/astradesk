[project]
name = "astradesk-domain-support"
version = "0.3.0"
description = "Support domain pack for AstraDesk — ticket triage with integrations for JIRA, Slack, and Asana."
authors = [{ name = "Siergej Sobolewski", email = "s.sobolewski@hotmail.com" }]

license = "GPL-2.0-only"
requires-python = ">=3.13"

dependencies = [
  "astradesk-core",
  # tools/mcp_server.py imports these directly to serve the pack's standalone
  # MCP server; pinned to the same range as services/api-gateway so the
  # workspace lock resolves one already-audited version, not a second one.
  "fastapi>=0.133,<0.134",
  "uvicorn[standard]>=0.30,<0.31",
]

[project.entry-points."astradesk.pack"]
domain_support = "domain_support:Pack"

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.23",
    "respx>=0.20,<1.0", 
]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["domain_support*"]
namespaces = false

[tool.setuptools.package-data]
domain_support = ["flows/*.yaml", "policies/*.rego"]
